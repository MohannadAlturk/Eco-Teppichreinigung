<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 180" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&amp;display=swap');
    </style>
  </defs>
  <!-- Shadow/outline layer -->
  <text x="700" y="130" 
    font-family="'Dancing Script', cursive" 
    font-weight="700" 
    font-size="110" 
    text-anchor="middle"
    fill="#1a1a1a" 
    stroke="#1a1a1a" 
    stroke-width="6"
    paint-order="stroke fill"
    font-style="italic"
  >Eco Teppich-Reinigung</text>
  <!-- Main text layer -->
  <text x="700" y="130" 
    font-family="'Dancing Script', cursive" 
    font-weight="700" 
    font-size="110" 
    text-anchor="middle"
    fill="#E8612D"
    stroke="#2a2a2a" 
    stroke-width="2.5"
    paint-order="stroke fill"
    font-style="italic"
  >Eco Teppich-Reinigung</text>
</svg>
